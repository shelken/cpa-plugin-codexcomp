name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Clone CLIProxyAPI SDK (latest release)
        run: |
          CPA_TAG=$(curl -s https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          echo "Cloning CPA $CPA_TAG"
          git clone --depth 1 --branch "$CPA_TAG" https://github.com/router-for-me/CLIProxyAPI.git /tmp/CLIProxyAPI

      - name: Replace SDK path
        run: sed -i "s|../CLIProxyAPI|/tmp/CLIProxyAPI|g" go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -buildmode=c-shared -o codexcomp-linux-amd64.so

      - uses: actions/upload-artifact@v4
        with:
          name: codexcomp-linux-amd64.so
          path: codexcomp-linux-amd64.so

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install ARM64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone CLIProxyAPI SDK (latest release)
        run: |
          CPA_TAG=$(curl -s https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          echo "Cloning CPA $CPA_TAG"
          git clone --depth 1 --branch "$CPA_TAG" https://github.com/router-for-me/CLIProxyAPI.git /tmp/CLIProxyAPI

      - name: Replace SDK path
        run: sed -i "s|../CLIProxyAPI|/tmp/CLIProxyAPI|g" go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
        run: |
          go mod tidy
          go build -trimpath -ldflags="-s -w" -buildmode=c-shared -o codexcomp-linux-arm64.so

      - uses: actions/upload-artifact@v4
        with:
          name: codexcomp-linux-arm64.so
          path: codexcomp-linux-arm64.so

  release:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/codexcomp-linux-amd64.so
            artifacts/codexcomp-linux-arm64.so
